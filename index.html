<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FixEye</title>
    <!-- Turnstile API -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #0a0a0f;
            color: #f0f0f0;
        }

        /* ПИКСЕЛЬНЫЙ ФОН — красный слева, синий справа (оставим как есть) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(45deg, #ff3b3b 0px, #ff3b3b 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(135deg, #ff3b3b 0px, #ff3b3b 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(45deg, #3b8cff 0px, #3b8cff 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(135deg, #3b8cff 0px, #3b8cff 6px, transparent 6px, transparent 12px);
            background-size: 80px 80px, 80px 80px, 80px 80px, 80px 80px;
            background-position: 0 0, 40px 40px, 80px 0, 120px 40px;
            opacity: 0.2;
            z-index: -2;
            pointer-events: none;
        }

        /* Размытое пятно посередине (тоже оставим) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, 
                rgba(255, 80, 80, 0.3) 0%, 
                rgba(70, 140, 255, 0.3) 60%, 
                transparent 90%);
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* Шапка — теперь тоже в синем стиле */
        .header {
            background: rgba(25, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            margin: 20px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 2px solid #3b8cff; /* синяя обводка */
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background: linear-gradient(145deg, #3b8cff, #8fb0ff); /* синий градиент */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 6px 20px rgba(59, 140, 255, 0.5);
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #8fb0ff, #3b8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 13px;
            color: #b0b0b0;
        }

        .main-container {
            flex: 1;
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        /* Экран капчи (уже синий, оставляем как есть) */
        .captcha-screen {
            background: rgba(25, 20, 30, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 2px solid #3b8cff;
            padding: 30px 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 350px;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .captcha-title {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 500;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #3b8cff, #8fb0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .captcha-description {
            color: #b0b0b0;
            margin-bottom: 25px;
            max-width: 400px;
            line-height: 1.5;
            font-size: clamp(14px, 4vw, 16px);
            padding: 0 10px;
        }

        .captcha-box {
            background: rgba(15, 10, 20, 0.6);
            border-radius: 20px;
            padding: 20px 15px;
            border: 2px solid rgba(59, 140, 255, 0.5);
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(59, 140, 255, 0.1);
        }

        .cf-turnstile {
            margin: 5px 0;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .cf-turnstile iframe {
            max-width: 100%;
        }

        .status-message {
            margin-top: 15px;
            color: #3b8cff;
            font-size: 14px;
            min-height: 20px;
        }

        .captcha-footer {
            margin-top: 25px;
            font-size: 14px;
            color: #6b6b6b;
            letter-spacing: 1px;
            border-top: 1px solid rgba(59, 140, 255, 0.2);
            padding-top: 15px;
            width: 100%;
            text-align: center;
        }

        /* Чат — теперь тоже в синем */
        .chat-panel {
            background: rgba(25, 20, 30, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 2px solid #3b8cff;
            padding: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            height: calc(90vh - 140px);
            min-height: 500px;
            display: none;
            width: 100%;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 8px 8px 20px 8px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: messageAppear 0.3s ease;
        }

        .message-right {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(40, 35, 45, 0.9);
            backdrop-filter: blur(5px);
            border: 2px solid #3b8cff; /* синяя обводка */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            color: #8fb0ff;
        }

        .avatar-user {
            background: linear-gradient(145deg, #ff5f5f, #ff8f8f); /* красный для пользователя (контраст) */
            border-color: #ff8f8f;
            color: white;
        }

        .bubble {
            padding: 14px 20px;
            border-radius: 20px;
            background: rgba(35, 30, 40, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(59, 140, 255, 0.3); /* синий оттенок */
            color: #f0f0f0;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .bubble-user {
            background: rgba(255, 95, 95, 0.25);
            border: 1px solid rgba(255, 140, 140, 0.3);
        }

        /* Индикатор печати — синий */
        .typing-indicator {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            background: rgba(35, 30, 40, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            width: fit-content;
            border: 1px solid rgba(59, 140, 255, 0.3);
        }

        .typing-dot {
            width: 10px;
            height: 10px;
            background: #3b8cff;
            border-radius: 4px;
            animation: typingPulse 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            background: #5f9eff;
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            background: #8fb0ff;
            animation-delay: 0.4s;
        }

        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.4; transform: scale(0.9); }
            30% { opacity: 1; transform: scale(1.2); }
        }

        /* Поле ввода — синяя обводка */
        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            background: rgba(25, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 6px 6px 6px 20px;
            border: 2px solid #3b8cff;
        }

        .input-area textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            padding: 14px 0;
            resize: none;
            max-height: 120px;
        }

        .input-area textarea::placeholder {
            color: #888;
        }

        /* Кнопка отправки — синяя */
        .send-button {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: #3b8cff;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(59, 140, 255, 0.5);
        }

        .send-button:hover {
            background: #5f9eff;
            transform: scale(1.02);
        }

        .send-button:active {
            transform: scale(0.98);
        }

        /* Синяя кнопка Telegram */
        .tg-button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        .tg-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #3b8cff;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 14px 30px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(59, 140, 255, 0.4);
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }

        .tg-button:hover {
            background: #5f9eff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 140, 255, 0.6);
        }

        .tg-button:active {
            transform: translateY(0);
        }

        .tg-button span {
            font-size: 24px;
            line-height: 1;
        }

        .footer {
            text-align: center;
            padding: 16px;
            color: #8fb0ff;
            font-size: 13px;
            border-top: 1px solid rgba(59, 140, 255, 0.2);
            margin-top: 10px;
        }

        /* Скроллбар синий */
        .chat-window::-webkit-scrollbar {
            width: 6px;
        }

        .chat-window::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .chat-window::-webkit-scrollbar-thumb {
            background: #3b8cff;
            border-radius: 10px;
        }

        /* Адаптация */
        @media (max-width: 600px) {
            .header {
                margin: 12px;
                padding: 12px 18px;
            }

            .logo-icon {
                width: 44px;
                height: 44px;
                font-size: 24px;
            }

            .logo-text h1 {
                font-size: 22px;
            }

            .captcha-screen {
                padding: 25px 15px;
                min-height: 300px;
            }

            .captcha-box {
                padding: 15px 10px;
                max-width: 100%;
            }

            .chat-panel {
                padding: 16px;
                height: calc(90vh - 120px);
            }

            .message {
                max-width: 90%;
            }

            .avatar {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }

            .bubble {
                padding: 12px 16px;
                font-size: 14px;
            }

            .tg-button {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">👁️</div>
            <div class="logo-text">
                <h1>FIXEYE</h1>
                <p>красный · синий</p>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- Экран капчи -->
        <div id="captchaScreen" class="captcha-screen">
            <div class="captcha-title">проверка</div>
            <div class="captcha-description">
                нажми на квадрат чтобы доказать что ты не бот
            </div>
            <div class="captcha-box">
                <div class="cf-turnstile" 
                     data-sitekey="0x4AAAAAAChbxGdeEfVPW7Da"
                     data-callback="onCaptchaSuccess"
                     data-theme="dark"
                     data-size="flexible">
                </div>
                <div id="captchaStatus" class="status-message"></div>
            </div>
            <div class="captcha-footer">MrStels • 2026</div>
        </div>

        <!-- Чат -->
        <div id="chatPanel" class="chat-panel" style="display: none;">
            <div class="chat-window" id="chatWindow">
                <div class="message">
                    <div class="avatar">👁️</div>
                    <div class="bubble">
                        <strong style="color: #8fb0ff;">FixEye AI</strong><br>
                        Привет.
                    </div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="userInput" placeholder="Сообщение..." rows="1"></textarea>
                <button class="send-button" id="sendBtn">↵</button>
            </div>

            <div class="tg-button-container">
                <a href="https://t.me/+KkWe78dYOOk4Zjgy" target="_blank" class="tg-button">
                    <span>✈️</span> Все модеры фиксая
                </a>
            </div>
        </div>
    </main>

    <footer class="footer">
        FixEye
    </footer>

    <script>
        (function() {
            const API_KEY = "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";
            
            const captchaScreen = document.getElementById('captchaScreen');
            const chatPanel = document.getElementById('chatPanel');
            const chatWindow = document.getElementById('chatWindow');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const captchaStatus = document.getElementById('captchaStatus');

            window.onCaptchaSuccess = function(token) {
                console.log('Captcha success');
                captchaStatus.textContent = '✓ проверка пройдена';
                
                setTimeout(() => {
                    captchaScreen.style.display = 'none';
                    chatPanel.style.display = 'flex';
                }, 500);
            };

            function addUserMessage(text) {
                const div = document.createElement('div');
                div.className = 'message message-right';
                div.innerHTML = `
                    <div class="avatar avatar-user">ТЫ</div>
                    <div class="bubble bubble-user">${text}</div>
                `;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            function addAssistantMessage(text) {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `
                    <div class="avatar">👁️</div>
                    <div class="bubble">
                        <strong style="color: #8fb0ff;">FixEye AI</strong><br>${text}
                    </div>
                `;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            let typingIndicator = null;

            function showTyping() {
                if (typingIndicator) return;
                typingIndicator = document.createElement('div');
                typingIndicator.className = 'message';
                typingIndicator.id = 'typingIndicator';
                typingIndicator.innerHTML = `
                    <div class="avatar">👁️</div>
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                chatWindow.appendChild(typingIndicator);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            function hideTyping() {
                if (typingIndicator) {
                    typingIndicator.remove();
                    typingIndicator = null;
                }
            }

            async function askAI(userText) {
                showTyping();
                try {
                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${API_KEY}`,
                            "Content-Type": "application/json",
                            "HTTP-Referer": "https://fixeyelab.github.io/fixeye",
                            "X-Title": "FixEye"
                        },
                        body: JSON.stringify({
                            model: "google/gemini-2.0-flash-exp:free",
                            messages: [
                                { role: "system", content: "Ты FixEye AI. Отвечай кратко и по делу." },
                                { role: "user", content: userText }
                            ]
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    hideTyping();
                    
                    let reply = "...";
                    if (data.choices && data.choices[0] && data.choices[0].message) {
                        reply = data.choices[0].message.content;
                    } else if (data.error) {
                        reply = `Ошибка: ${data.error.message}`;
                    }
                    
                    addAssistantMessage(reply);
                } catch (error) {
                    hideTyping();
                    addAssistantMessage("...");
                    console.error(error);
                }
            }

            sendBtn.addEventListener('click', () => {
                const text = userInput.value.trim();
                if (!text) return;
                addUserMessage(text);
                userInput.value = '';
                askAI(text);
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendBtn.click();
                }
            });

            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        })();
    </script>
</body>
</html>
