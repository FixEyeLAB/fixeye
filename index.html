        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;

            flex-direction: column;
            position: relative;
            background: #0a0a0f;
            color: #f0f0f0;
            transition: border-color 0.3s, background 0.3s;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(45deg, #ff3b3b 0px, #ff3b3b 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(135deg, #ff3b3b 0px, #ff3b3b 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(45deg, #3b8cff 0px, #3b8cff 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(135deg, #3b8cff 0px, #3b8cff 6px, transparent 6px, transparent 12px);
            background-size: 80px 80px, 80px 80px, 80px 80px, 80px 80px;
            background-position: 0 0, 40px 40px, 80px 0, 120px 40px;
            opacity: 0.2;
            z-index: -2;
            pointer-events: none;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, 
                rgba(255, 80, 80, 0.3) 0%, 
                rgba(70, 140, 255, 0.3) 60%,

            pointer-events: none;
            mix-blend-mode: overlay;

            padding: 16px 24px;

            align-items: center;
            gap: 12px;
            border: 2px solid var(--accent-color, #3b8cff);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            flex-wrap: nowrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

            .tg-button { padding: 12px 24px; font-size: 14px; }

        }
    </style>
</head>

    <script>
        (function() {
            const API_KEY = "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";
            
            // --- ПРОКСИ ---
            const PROXY_URL = "https://thingproxy.freeboard.io/fetch/";
            const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
            
            // --- ЭЛЕМЕНТЫ ---
            const captchaScreen = document.getElementById('captchaScreen');
            const chatPanel = document.getElementById('chatPanel');
            const chatWindow = document.getElementById('chatWindow');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const captchaStatus = document.getElementById('captchaStatus');
            const themeToggle = document.getElementById('themeToggle');
            const soundToggle = document.getElementById('soundToggle');
            const infoToggle = document.getElementById('infoToggle');
            
            // --- ЭЛЕМЕНТЫ РЕЖИМОВ ---
            const modeBtns = document.querySelectorAll('.mode-btn');
            const aiMode = document.getElementById('aiMode');
            const searchMode = document.getElementById('searchMode');
            const gameMode = document.getElementById('gameMode');
            
            // --- ИГРА ---
            const gameInput = document.getElementById('gameInput');
            const gameBtn = document.getElementById('gameBtn');
            const gameHint = document.getElementById('gameHint');
            let secretNumber = Math.floor(Math.random() * 10) + 1;
            let gameActive = true;

            // --- ЗВУКИ через Web Audio API (улучшенные) ---
            let audioCtx = null;
            let soundEnabled = false;
            
            // Переменные для фоновой музыки
            let backgroundMusic = null;
            let musicGainNode = null;
            let musicOscillators = [];
            let musicInterval = null;
            let reverbNode = null;

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Создаем простую реверберацию через delay
                const delay = audioCtx.createDelay(1.5);
                delay.delayTime.value = 0.3;
                const feedback = audioCtx.createGain();
                feedback.gain.value = 0.3;
                delay.connect(feedback);
                feedback.connect(delay);
                reverbNode = delay;
            }

            function stopBackgroundMusic() {
                if (musicInterval) {
                    clearInterval(musicInterval);
                    musicInterval = null;
                }
                if (musicGainNode) {
                    // Плавное затухание
                    musicGainNode.gain.setValueAtTime(musicGainNode.gain.value, audioCtx.currentTime);
                    musicGainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
                    setTimeout(() => {
                        musicOscillators.forEach(osc => {
                            try { osc.stop(); } catch(e) {}
                        });
                        musicOscillators = [];
                        backgroundMusic = null;
                    }, 1000);
                }
            }

            function playPad(freq, gain = 0.02) {
                if (!soundEnabled || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = gain;
                
                // Фильтр для мягкости
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                
                osc.connect(gainNode);
                gainNode.connect(filter);
                filter.connect(musicGainNode);
                
                osc.start();
                return { osc, gainNode, filter };
            }

            function startBackgroundMusic() {
                if (!soundEnabled || !audioCtx) return;
                
                stopBackgroundMusic();
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                // Основной выход с реверберацией
                musicGainNode = audioCtx.createGain();
                musicGainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                
                if (reverbNode) {
                    musicGainNode.connect(reverbNode);
                    reverbNode.connect(audioCtx.destination);
                } else {
                    musicGainNode.connect(audioCtx.destination);
                }
                
                // Фоновый эмбиент (аккорд Cmaj7)
                const pad1 = playPad(130.81, 0.03); // C3
                const pad2 = playPad(164.81, 0.02); // E3
                const pad3 = playPad(196.00, 0.02); // G3
                const pad4 = playPad(261.63, 0.01); // C4
                
                musicOscillators = [pad1?.osc, pad2?.osc, pad3?.osc, pad4?.osc].filter(Boolean);
                
                // Медленная мелодия (как в Minecraft)
                const melodyNotes = [
                    523.25, 587.33, 659.25, 523.25, 493.88, 523.25, 587.33, 659.25, 698.46, 659.25, 587.33
                ];
                let noteIndex = 0;
                
                function playNextNote() {
                    if (!soundEnabled || !audioCtx) return;
                    
                    const freq = melodyNotes[noteIndex % melodyNotes.length];
                    const osc = audioCtx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.04;
                    
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    
                    osc.connect(gainNode);
                    gainNode.connect(filter);
                    filter.connect(musicGainNode);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 2);
                    
                    noteIndex++;
                }
                
                // Первая нота через 1 сек
                setTimeout(playNextNote, 1000);
                musicInterval = setInterval(playNextNote, 4000);
            }

            function beep(freq = 800, duration = 0.1, vol = 0.1) {
                if (!soundEnabled || !audioCtx) return;
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                gainNode.gain.value = vol;
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            }

            soundToggle.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
                
                if (soundEnabled) {
                    initAudio();
                    startBackgroundMusic();
                    beep(600, 0.15, 0.08);
                } else {
                    stopBackgroundMusic();
                }
            });

            function playSendSound() {
                beep(700, 0.08, 0.06);
            }

            function playWinSound() {
                beep(1200, 0.2, 0.08);
                beep(1500, 0.15, 0.08);
            }

            // --- ТЕМА ---
            const root = document.documentElement;
            let isRedTheme = localStorage.getItem('fixeye_theme') === 'red';

            function setTheme(red) {
                if (red) {
                    root.style.setProperty('--accent-color', '#ff5f5f');
                    root.style.setProperty('--accent-light', '#ff9f9f');
                } else {
                    root.style.setProperty('--accent-color', '#3b8cff');
                    root.style.setProperty('--accent-light', '#8fb0ff');
                }
                localStorage.setItem('fixeye_theme', red ? 'red' : 'blue');
            }
            setTheme(isRedTheme);

            themeToggle.addEventListener('click', () => {
                isRedTheme = !isRedTheme;
                setTheme(isRedTheme);
            });

            // --- ИНФО ---
            infoToggle.addEventListener('click', () => {
                alert('FixEye v1.0.0 (сборка 1030)');
            });

            // --- ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ---
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    aiMode.classList.add('hidden');
                    searchMode.classList.add('hidden');
                    gameMode.classList.add('hidden');
                    
                    const mode = btn.dataset.mode;
                    if (mode === 'ai') {
                        aiMode.classList.remove('hidden');
                    } else if (mode === 'search') {
                        searchMode.classList.remove('hidden');
                        // Принудительно перезапускаем поиск Google (если есть API)
                        if (window.google && window.google.search && window.google.search.cse) {
                            window.google.search.cse.element.render();
                        }
                    } else if (mode === 'game') {
                        gameMode.classList.remove('hidden');
                    }
                });
            });

            // --- КАПЧА ---
            window.onCaptchaSuccess = function(token) {
                captchaStatus.textContent = '✓ проверка пройдена';
                setTimeout(() => {
                    captchaScreen.style.display = 'none';
                    chatPanel.style.display = 'flex';
                    // Новая игра
                    secretNumber = Math.floor(Math.random() * 10) + 1;
                    gameHint.textContent = 'загадано число (1–10)';
                    gameActive = true;
                }, 500);
            };

            // --- ЧАТ AI ---
            function addUserMessage(text) {
                const div = document.createElement('div');
                div.className = 'message message-right';
                div.innerHTML = `
                    <div class="avatar avatar-user">ТЫ</div>
                    <div class="bubble bubble-user">${text}</div>
                `;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                playSendSound();
            }

            function addAssistantMessage(text) {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `
                    <div class="avatar">👁️</div>
                    <div class="bubble">
                        <strong style="color: var(--accent-light);">FixEye AI 3.1 Pro</strong><br>${text}
                    </div>
                `;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            let typingIndicator = null;
            function showTyping() {
                if (typingIndicator) return;
                typingIndicator = document.createElement('div');
                typingIndicator.className = 'message';
                typingIndicator.id = 'typingIndicator';
                typingIndicator.innerHTML = `
                    <div class="avatar">👁️</div>
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                chatWindow.appendChild(typingIndicator);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
            function hideTyping() {
                if (typingIndicator) typingIndicator.remove();
                typingIndicator = null;
            }

            async function askAI(userText) {
                showTyping();
                try {
                    let model = "google/gemini-2.0-flash-exp:free";
                    let response = await fetch(PROXY_URL + OPENROUTER_URL, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${API_KEY}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: [
                                { role: "system", content: "Ты FixEye AI. Отвечай кратко и по делу." },
                                { role: "user", content: userText }
                            ]
                        })
                    });

                    if (!response.ok) {
                        console.warn("Gemini не отвечает, пробуем Llama");
                        model = "meta-llama/llama-3.2-3b-instruct:free";
                        response = await fetch(PROXY_URL + OPENROUTER_URL, {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${API_KEY}`,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                model: model,
                                messages: [
                                    { role: "system", content: "Ты FixEye AI. Отвечай кратко." },
                                    { role: "user", content: userText }
                                ]
                            })
                        });
                    }

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    hideTyping();
                    
                    let reply = data.choices?.[0]?.message?.content || "...";
                    addAssistantMessage(reply);
                } catch (error) {
                    hideTyping();
                    addAssistantMessage("... (ошибка связи)");
                    console.error(error);
                }
            }

            sendBtn.addEventListener('click', () => {
                const text = userInput.value.trim();
                if (!text) return;
                addUserMessage(text);
                userInput.value = '';
                askAI(text);
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendBtn.click();
                }
            });
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // --- ИГРА ---
            gameBtn.addEventListener('click', () => {
                if (!gameActive) {
                    secretNumber = Math.floor(Math.random() * 10) + 1;
                    gameHint.textContent = 'загадано число (1–10)';
                    gameActive = true;
                    gameBtn.textContent = 'проверить';
                    return;
                }

                const guess = parseInt(gameInput.value);
                if (isNaN(guess) || guess < 1 || guess > 10) {
                    gameHint.textContent = '⚠️ введи число от 1 до 10';
                    return;
                }

                if (guess === secretNumber) {
                    gameHint.textContent = '🎉 Угадал! Число было ' + secretNumber + '. Сыграем ещё?';
                    gameActive = false;
                    gameBtn.textContent = 'новая игра';
                    playWinSound();
                } else if (guess < secretNumber) {
                    gameHint.textContent = '⬆️ больше';
                } else {
                    gameHint.textContent = '⬇️ меньше';
                }
                gameInput.value = '';
            });

            gameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    gameBtn.click();
                }
            });
        })();
    </script>
</body>
</html>
