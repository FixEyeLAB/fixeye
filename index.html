<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FixEye</title>
    <!-- Фавикон с сайта мерча -->
    <link rel="icon" href="https://fixeye.shop/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://fixeye.shop/favicon.ico" type="image/x-icon">
    <!-- Google Custom Search -->
    <script async src="https://cse.google.com/cse.js?cx=602050ee93df247a1"></script>
    <!-- Turnstile API (капча) -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <!-- Firebase SDK для Google и GitHub -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #0a0a0f;
            color: #f0f0f0;
            transition: border-color 0.3s, background 0.3s;
        }
        /* Динамический фон под тему */
        body.theme-red::before {
            filter: hue-rotate(180deg);
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(45deg, #ff3b3b 0px, #ff3b3b 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(135deg, #ff3b3b 0px, #ff3b3b 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(45deg, #3b8cff 0px, #3b8cff 6px, transparent 6px, transparent 12px),
                repeating-linear-gradient(135deg, #3b8cff 0px, #3b8cff 6px, transparent 6px, transparent 12px);
            background-size: 80px 80px, 80px 80px, 80px 80px, 80px 80px;
            background-position: 0 0, 40px 40px, 80px 0, 120px 40px;
            opacity: 0.2;
            z-index: -2;
            pointer-events: none;
            transition: filter 0.5s ease;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, 
                rgba(255, 80, 80, 0.3) 0%, 
                rgba(70, 140, 255, 0.3) 60%, 
                transparent 90%);
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: overlay;
        }
        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .header, .login-screen, .chat-panel, .mode-btn, .auth-btn, .settings-btn, .user-avatar {
            animation: fadeIn 0.5s ease;
        }
        .auth-btn.active:hover {
            animation: pulse 0.3s ease;
        }
        .header {
            background: rgba(25, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            margin: 20px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid var(--accent-color, #3b8cff);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            flex-wrap: nowrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: #1a1a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--accent-color, #3b8cff);
            transform: translateY(2px);
            flex-shrink: 0;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .logo-text h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-light, #8fb0ff), var(--accent-color, #3b8cff));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        .logo-text p {
            font-size: 13px;
            color: #b0b0b0;
            white-space: nowrap;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }
        /* Аватар пользователя (скрыт до входа) */
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            border: 2px solid var(--accent-color, #3b8cff);
            cursor: pointer;
            overflow: hidden;
            background: #1a1a2a;
            display: none;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .user-avatar:hover {
            transform: scale(1.05);
            border-color: var(--accent-light, #8fb0ff);
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-avatar span {
            font-size: 24px;
            color: var(--accent-color, #3b8cff);
        }
        /* Кнопка настроек (всегда видна) */
        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--accent-color, #3b8cff);
            color: var(--accent-color, #3b8cff);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 22px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .settings-btn:hover {
            background: var(--accent-color, #3b8cff);
            color: white;
            animation: pulse 0.3s ease;
        }
        /* Панель настроек */
        .settings-panel {
            position: absolute;
            top: 90px;
            right: 30px;
            background: rgba(25, 20, 30, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid var(--accent-color, #3b8cff);
            border-radius: 20px;
            padding: 16px;
            min-width: 180px;
            display: none;
            z-index: 1000;
            flex-direction: column;
            gap: 10px;
        }
        .settings-panel.show {
            display: flex;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid var(--accent-color, #3b8cff);
            cursor: pointer;
        }
        .settings-item:hover {
            background: var(--accent-color, #3b8cff);
            color: white;
        }
        /* Выпадающее меню аватара */
        .avatar-dropdown {
            position: absolute;
            top: 90px;
            right: 80px;
            background: rgba(25, 20, 30, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid var(--accent-color, #3b8cff);
            border-radius: 20px;
            padding: 16px;
            min-width: 220px;
            display: none;
            z-index: 1000;
        }
        .avatar-dropdown.show {
            display: block;
        }
        .user-info {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--accent-color, #3b8cff);
        }
        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-light, #8fb0ff);
        }
        .user-email {
            font-size: 14px;
            color: #b0b0b0;
            margin-top: 5px;
            word-break: break-word;
        }
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255, 80, 80, 0.2);
            border: 2px solid #ff5f5f;
            color: #ff8f8f;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: #ff5f5f;
            color: white;
        }
        .main-container {
            flex: 1;
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }
        /* Экран входа */
        .login-screen {
            background: rgba(25, 20, 30, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 2px solid var(--accent-color, #3b8cff);
            padding: 30px 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 450px;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        .login-title {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 500;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-color, #3b8cff), var(--accent-light, #8fb0ff));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-description {
            color: #b0b0b0;
            margin-bottom: 30px;
            max-width: 400px;
            line-height: 1.5;
            font-size: clamp(14px, 4vw, 16px);
            padding: 0 10px;
        }
        .login-box {
            background: rgba(15, 10, 20, 0.6);
            border-radius: 20px;
            padding: 25px 20px;
            border: 2px solid var(--accent-color, #3b8cff);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: inset 0 0 20px rgba(59, 140, 255, 0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid var(--accent-color, #3b8cff);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0.6;
            pointer-events: none;
        }
        .auth-btn.active {
            opacity: 1;
            pointer-events: all;
        }
        .auth-btn.active:hover {
            background: var(--accent-color, #3b8cff);
            color: white;
            animation: pulse 0.3s ease;
        }
        .auth-btn.github.active:hover {
            background: #333;
            border-color: #333;
        }
        .auth-btn.google.active:hover {
            background: #DB4437;
            border-color: #DB4437;
        }
        .auth-btn.telegram.active:hover {
            background: #0088cc;
            border-color: #0088cc;
        }
        .auth-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        .auth-divider {
            color: #6b6b6b;
            font-size: 14px;
            margin: 5px 0;
        }
        .cf-turnstile {
            margin: 5px 0;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .status-message {
            color: var(--accent-color, #3b8cff);
            font-size: 14px;
            min-height: 20px;
            margin-top: 10px;
        }
        .captcha-footer {
            margin-top: 25px;
            font-size: 14px;
            color: #6b6b6b;
            border-top: 1px solid var(--accent-color, #3b8cff);
            padding-top: 15px;
            width: 100%;
            text-align: center;
        }
        .chat-panel {
            background: rgba(25, 20, 30, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 2px solid var(--accent-color, #3b8cff);
            padding: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            min-height: 500px;
            display: none;
            width: 100%;
        }
        
        /* Переключатель режимов (как в Google) */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--accent-color, #3b8cff);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .mode-selector::-webkit-scrollbar {
            height: 4px;
        }
        .mode-selector::-webkit-scrollbar-thumb {
            background: var(--accent-color, #3b8cff);
            border-radius: 4px;
        }
        .mode-btn {
            background: transparent;
            border: 2px solid transparent;
            color: #b0b0b0;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .mode-btn.active {
            background: var(--accent-color, #3b8cff);
            color: white;
            border-color: var(--accent-light, #8fb0ff);
        }
        .mode-btn:hover:not(.active) {
            border-color: var(--accent-color, #3b8cff);
            color: var(--accent-color, #3b8cff);
        }
        
        /* Контейнеры режимов */
        .mode-container {
            flex: 1;
            overflow-y: auto;
        }
        .mode-container.hidden {
            display: none;
        }
        
        /* AI режим */
        .chat-window {
            height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 8px 8px 20px 8px;
            scroll-behavior: smooth;
            margin-bottom: 16px;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: messageAppear 0.3s ease;
        }
        .message-right { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar {
            width: 44px; height: 44px; border-radius: 14px;
            background: rgba(40, 35, 45, 0.9);
            backdrop-filter: blur(5px);
            border: 2px solid var(--accent-color, #3b8cff);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0; color: var(--accent-light, #8fb0ff);
        }
        .avatar-user {
            background: linear-gradient(145deg, #ff5f5f, #ff8f8f);
            border-color: #ff8f8f; color: white;
        }
        .bubble {
            padding: 14px 20px; border-radius: 20px;
            background: rgba(35, 30, 40, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid var(--accent-color, #3b8cff);
            color: #f0f0f0; font-size: 15px; line-height: 1.5;
            word-break: break-word;
        }
        .bubble-user {
            background: rgba(255, 95, 95, 0.25);
            border: 1px solid rgba(255, 140, 140, 0.3);
        }
        .typing-indicator {
            display: flex; gap: 8px; padding: 16px 24px;
            background: rgba(35, 30, 40, 0.8);
            backdrop-filter: blur(10px); border-radius: 20px;
            width: fit-content; border: 1px solid var(--accent-color, #3b8cff);
        }
        .typing-dot {
            width: 10px; height: 10px; background: var(--accent-color, #3b8cff);
            border-radius: 4px; animation: typingPulse 1.4s infinite;
        }
        .typing-dot:nth-child(2) { background: var(--accent-light, #5f9eff); animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { background: var(--accent-light, #8fb0ff); animation-delay: 0.4s; }
        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.4; transform: scale(0.9); }
            30% { opacity: 1; transform: scale(1.2); }
        }
        .input-area {
            display: flex; gap: 12px;
            background: rgba(25, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; padding: 6px 6px 6px 20px;
            border: 2px solid var(--accent-color, #3b8cff);
        }
        .input-area textarea {
            flex: 1; background: transparent; border: none; outline: none;
            color: white; font-family: 'Inter', sans-serif; font-size: 16px;
            padding: 14px 0; resize: none; max-height: 120px;
        }
        .input-area textarea::placeholder { color: #888; }
        .send-button {
            width: 56px; height: 56px; border-radius: 16px;
            background: var(--accent-color, #3b8cff);
            border: none; color: white;
            font-size: 24px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px var(--accent-color, #3b8cff);
        }
        .send-button:hover { background: var(--accent-light, #5f9eff); transform: scale(1.02); }
        .send-button:active { transform: scale(0.98); }
        
        /* Поиск Google */
        .search-container {
            padding: 10px 0;
            min-height: 400px;
        }
        .gcse-searchbox {
            margin-bottom: 20px;
        }
        
        /* Игра */
        .game-container {
            padding: 20px;
        }
        .game-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: var(--accent-color, #3b8cff);
        }
        .game-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .game-input {
            flex: 1;
            background: rgba(15, 10, 20, 0.7);
            border: 2px solid var(--accent-color, #3b8cff);
            border-radius: 15px;
            padding: 12px 16px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .game-button {
            background: var(--accent-color, #3b8cff);
            border: none;
            border-radius: 15px;
            padding: 0 25px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-button:hover {
            background: var(--accent-light, #5f9eff);
            animation: pulse 0.3s ease;
        }
        .game-hint {
            color: #b0b0b0;
            font-size: 14px;
            min-height: 20px;
        }
        .score-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid var(--accent-color, #3b8cff);
        }
        .score-label {
            color: #b0b0b0;
            font-size: 14px;
        }
        .score-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-color, #3b8cff);
        }
        
        /* Кнопка Telegram */
        .tg-button-container {
            display: flex; justify-content: center; margin: 20px 0;
        }
        .tg-button {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--accent-color, #3b8cff);
            color: white; text-decoration: none;
            font-size: 16px; font-weight: 500; padding: 14px 30px;
            border-radius: 30px; border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px var(--accent-color, #3b8cff);
            transition: 0.2s; backdrop-filter: blur(5px);
        }
        .tg-button:hover {
            background: var(--accent-light, #5f9eff);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-color, #3b8cff);
        }
        .tg-button:active { transform: translateY(0); }
        .tg-button span { font-size: 24px; line-height: 1; }
        
        .footer {
            text-align: center; padding: 16px; color: #8fb0ff;
            font-size: 13px; border-top: 1px solid var(--accent-color, #3b8cff);
            margin-top: 10px;
        }
        .chat-window::-webkit-scrollbar { width: 6px; }
        .chat-window::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); border-radius: 10px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: var(--accent-color, #3b8cff); border-radius: 10px;
        }
        
        /* Мобильная адаптация */
        @media (max-width: 600px) {
            .header {
                margin: 10px;
                padding: 10px 12px;
                gap: 6px;
            }
            .logo-icon {
                width: 36px;
                height: 36px;
            }
            .logo-text h1 {
                font-size: 18px;
            }
            .logo-text p {
                font-size: 10px;
            }
            .user-avatar {
                width: 36px;
                height: 36px;
            }
            .settings-btn {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .settings-panel {
                top: 70px;
                right: 10px;
                min-width: 160px;
                padding: 12px;
            }
            .avatar-dropdown {
                top: 70px;
                right: 50px;
                min-width: 180px;
                padding: 12px;
            }
            .login-screen {
                padding: 20px 15px;
                min-height: 400px;
            }
            .login-title {
                font-size: 24px;
            }
            .login-description {
                font-size: 14px;
                margin-bottom: 20px;
            }
            .login-box {
                padding: 20px 15px;
            }
            .auth-btn {
                padding: 12px 15px;
                font-size: 14px;
            }
            .chat-panel {
                padding: 15px;
            }
            .mode-btn {
                padding: 6px 15px;
                font-size: 14px;
            }
            .chat-window {
                height: 250px;
            }
            .avatar {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .bubble {
                padding: 10px 14px;
                font-size: 14px;
            }
            .input-area textarea {
                font-size: 14px;
                padding: 10px 0;
            }
            .send-button {
                width: 46px;
                height: 46px;
                font-size: 20px;

            let audioCtx = null;

            // Переменные для фоновой музыки
            let backgroundMusic = null;
            let musicGainNode = null;
            let musicOscillators = [];
            let musicInterval = null;
            let reverbNode = null;
            
            // --- ПАСХАЛКА ---
            let easterEggSequence = [];

            let easterEggMusic = null;
            let easterEggInterval = null;

            // Загрузка счета из localStorage
            function loadScore() {
                const savedScore = localStorage.getItem('fixeye_score');
                if (savedScore !== null) {
                    score = parseInt(savedScore);
                    updateScoreDisplay();
                }
            }
            
            function updateScoreDisplay() {
                scoreDisplay.textContent = score;
                localStorage.setItem('fixeye_score', score);
            }

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Создаем простую реверберацию через delay
                const delay = audioCtx.createDelay(1.5);
                delay.delayTime.value = 0.3;
                const feedback = audioCtx.createGain();
                feedback.gain.value = 0.3;
                delay.connect(feedback);
                feedback.connect(delay);
                reverbNode = delay;
            }

            function stopBackgroundMusic() {
                if (musicInterval) {
                    clearInterval(musicInterval);
                    musicInterval = null;
                }
                if (musicGainNode) {
                    // Плавное затухание
                    musicGainNode.gain.setValueAtTime(musicGainNode.gain.value, audioCtx.currentTime);
                    musicGainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
                    setTimeout(() => {
                        musicOscillators.forEach(osc => {
                            try { osc.stop(); } catch(e) {}
                        });
                        musicOscillators = [];
                        backgroundMusic = null;
                    }, 1000);
                }
            }
            
            // --- МУЗЫКА ДЛЯ ПАСХАЛКИ (Minecraft C418 style) ---
            function playEasterEggMusic() {
                if (!audioCtx) return;
                
                if (easterEggActive) {
                    if (easterEggInterval) clearInterval(easterEggInterval);
                    if (easterEggMusic) easterEggMusic.forEach(osc => { try { osc.stop(); } catch(e) {} });
                }
                
                easterEggActive = true;
                
                const eggGain = audioCtx.createGain();
                eggGain.gain.value = 0.25;
                eggGain.connect(audioCtx.destination);
                
                const melodyNotes = [
                    523.25, 587.33, 659.25, 523.25, 493.88, 523.25, 587.33, 659.25, 698.46, 659.25, 587.33
                ];
                let noteIndex = 0;
                
                function playEggNote() {
                    const freq = melodyNotes[noteIndex % melodyNotes.length];
                    const osc = audioCtx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.15;
                    
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    
                    osc.connect(gainNode);
                    gainNode.connect(filter);
                    filter.connect(eggGain);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 2);
                    
                    noteIndex++;
                }
                
                const padOsc1 = audioCtx.createOscillator();
                padOsc1.type = 'sine';
                padOsc1.frequency.value = 130.81;
                const padGain1 = audioCtx.createGain();
                padGain1.gain.value = 0.08;
                padOsc1.connect(padGain1);
                padGain1.connect(eggGain);
                padOsc1.start();
                
                const padOsc2 = audioCtx.createOscillator();
                padOsc2.type = 'sine';
                padOsc2.frequency.value = 196.00;
                const padGain2 = audioCtx.createGain();
                padGain2.gain.value = 0.06;
                padOsc2.connect(padGain2);
                padGain2.connect(eggGain);
                padOsc2.start();
                
                easterEggMusic = [padOsc1, padOsc2];
                
                setTimeout(playEggNote, 500);
                easterEggInterval = setInterval(playEggNote, 3000);
                
                alert('🎉 Пасхалка найдена! Играет Minecraft мелодия');
            }

            function startBackgroundMusic() {
                if (!soundEnabled || !audioCtx) return;
                
                stopBackgroundMusic();
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                musicGainNode = audioCtx.createGain();
                musicGainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                
                if (reverbNode) {
                    musicGainNode.connect(reverbNode);
                    reverbNode.connect(audioCtx.destination);
                } else {
                    musicGainNode.connect(audioCtx.destination);
                }
                
                const pad1 = playPad(130.81, 0.03); // C3
                const pad2 = playPad(164.81, 0.02); // E3
                const pad3 = playPad(196.00, 0.02); // G3
                const pad4 = playPad(261.63, 0.01); // C4
                
                musicOscillators = [pad1?.osc, pad2?.osc, pad3?.osc, pad4?.osc].filter(Boolean);
                
                const melodyNotes = [
                    523.25, 587.33, 659.25, 523.25, 493.88, 523.25, 587.33, 659.25, 698.46, 659.25, 587.33
                ];
                let noteIndex = 0;
                
                function playNextNote() {
                    if (!soundEnabled || !audioCtx) return;
                    
                    const freq = melodyNotes[noteIndex % melodyNotes.length];
                    const osc = audioCtx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.04;
                    
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    
                    osc.connect(gainNode);
                    gainNode.connect(filter);
                    filter.connect(musicGainNode);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 2);
                    
                    noteIndex++;
                }
                
                setTimeout(playNextNote, 1000);
                musicInterval = setInterval(playNextNote, 4000);
            }

            function playPad(freq, gain = 0.02) {
                if (!soundEnabled || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = gain;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                
                osc.connect(gainNode);
                gainNode.connect(filter);
                filter.connect(musicGainNode);
                
                osc.start();
                return { osc, gainNode, filter };
            }

                if (!soundEnabled || !audioCtx) return;
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                gainNode.gain.value = vol;
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            }

                    .then(result => {
                        window.currentUser = result.user;
                        authPassed = true;
                        authStatus.textContent = `✓ Вход через GitHub: ${result.user.displayName}`;
                        checkLoginComplete();
                    })
                    .catch(error => {
                        authStatus.textContent = `❌ Ошибка: ${error.message}`;
                    });
            });

            // --- ВХОД ЧЕРЕЗ GOOGLE ---
            document.getElementById('googleLogin').addEventListener('click', () => {
                auth.signInWithPopup(googleProvider)
                    .then(result => {
                        window.currentUser = result.user;
                        authPassed = true;
                        authStatus.textContent = `✓ Вход через Google: ${result.user.displayName}`;
                        checkLoginComplete();
                    })
                    .catch(error => {
                        authStatus.textContent = `❌ Ошибка: ${error.message}`;
                    });
            });

            // --- ВХОД ЧЕРЕЗ TELEGRAM (исправлено!) ---
            document.getElementById('telegramLogin').addEventListener('click', () => {
                // Открываем окно авторизации Telegram
                const botName = 'FixEyeLAB_bot'; // Имя бота
                const redirectUrl = window.location.origin + window.location.pathname;
                const authUrl = `https://oauth.telegram.org/auth?bot_id=${botName}&origin=${encodeURIComponent(redirectUrl)}&return_to=${encodeURIComponent(redirectUrl)}`;
                
                // Открываем попап
                const popup = window.open(authUrl, 'telegram-auth', 'width=400,height=600');
                
                // Слушаем сообщение от попапа
                window.addEventListener('message', function(event) {
                    if (event.origin === 'https://oauth.telegram.org') {
                        if (event.data && event.data.auth) {
                            const user = event.data.auth;
                            window.currentUser = {
                                displayName: user.first_name + (user.last_name ? ' ' + user.last_name : ''),
                                email: user.username ? `@${user.username}` : '',
                                photoURL: null // Telegram не даёт фото через OAuth
                            };
                            
                            // Проверяем, является ли пользователь @tochno
                            if (user.username && user.username.toLowerCase() === 'tochno') {
                                specialTelegramUser = true;
                                authStatus.textContent = `✓ Особый вход: @tochno (капча не требуется)`;
                                checkLoginComplete();
                            } else {
                                authPassed = true;
                                authStatus.textContent = `✓ Вход через Telegram: ${window.currentUser.displayName}`;
                                if (captchaPassed) checkLoginComplete();
                            }
                            popup.close();
                        }
                    }
                });
            });

            // --- ПАСХАЛКА ---
            document.addEventListener('keydown', (e) => {
                if (e.key.length === 1) {
                    easterEggSequence.push(e.key.toUpperCase());
                    if (easterEggSequence.length > targetSequence.length) {
                        easterEggSequence.shift();
                    }
                    if (easterEggSequence.join('') === targetSequence.join('')) {
                        initAudio();
                        playEasterEggMusic();
                        easterEggSequence = [];
                    }
                }
            });

            // --- ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ---
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    aiMode.classList.add('hidden');
                    searchMode.classList.add('hidden');
                    gameMode.classList.add('hidden');
                    
                    const mode = btn.dataset.mode;
                    if (mode === 'ai') {
                        aiMode.classList.remove('hidden');
                    } else if (mode === 'search') {
                        searchMode.classList.remove('hidden');
                        if (window.google && window.google.search && window.google.search.cse) {
                            window.google.search.cse.element.render();
                        }
                    } else if (mode === 'game') {
                        gameMode.classList.remove('hidden');
                    }
                });
            });

            // --- ЧАТ AI ---
            function addUserMessage(text) {
                const div = document.createElement('div');
                div.className = 'message message-right';
                div.innerHTML = `
                    <div class="avatar avatar-user">ТЫ</div>
                    <div class="bubble bubble-user">${text}</div>
                `;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                playClickSound();
            }

            function addAssistantMessage(text) {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `
                    <div class="avatar">👁️</div>
                    <div class="bubble">
                        <strong style="color: var(--accent-light);">FixEye AI 3.1 Pro</strong><br>${text}
                    </div>
                `;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            let typingIndicator = null;
            function showTyping() {
                if (typingIndicator) return;
                typingIndicator = document.createElement('div');
                typingIndicator.className = 'message';
                typingIndicator.id = 'typingIndicator';
                typingIndicator.innerHTML = `
                    <div class="avatar">👁️</div>
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                chatWindow.appendChild(typingIndicator);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
            function hideTyping() {
                if (typingIndicator) typingIndicator.remove();
                typingIndicator = null;
            }

            async function askAI(userText) {
                showTyping();
                try {
                    let model = "google/gemini-2.0-flash-exp:free";
                    let response = await fetch(PROXY_URL + OPENROUTER_URL, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${API_KEY}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: [
                                { role: "system", content: "Ты FixEye AI. Отвечай кратко и по делу." },
                                { role: "user", content: userText }
                            ]
                        })
                    });

                    if (!response.ok) {
                        console.warn("Gemini не отвечает, пробуем Llama");
                        model = "meta-llama/llama-3.2-3b-instruct:free";
                        response = await fetch(PROXY_URL + OPENROUTER_URL, {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${API_KEY}`,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                model: model,
                                messages: [
                                    { role: "system", content: "Ты FixEye AI. Отвечай кратко." },
                                    { role: "user", content: userText }
                                ]
                            })
                        });
                    }

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    hideTyping();
                    
                    let reply = data.choices?.[0]?.message?.content || "...";
                    addAssistantMessage(reply);
                } catch (error) {
                    hideTyping();
                    addAssistantMessage("... (ошибка связи)");
                    console.error(error);
                }
            }

            sendBtn.addEventListener('click', () => {
                const text = userInput.value.trim();
                if (!text) return;
                addUserMessage(text);
                userInput.value = '';
                askAI(text);
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendBtn.click();
                }
            });
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // --- ИГРА ---
            loadScore();
            
            gameBtn.addEventListener('click', () => {
                if (!gameActive) {
                    secretNumber = Math.floor(Math.random() * 10) + 1;
                    gameHint.textContent = 'загадано число (1–10)';
                    gameActive = true;
                    gameBtn.textContent = 'проверить';
                    return;
                }

                const guess = parseInt(gameInput.value);
                if (isNaN(guess) || guess < 1 || guess > 10) {
                    gameHint.textContent = '⚠️ введи число от 1 до 10';
                    return;
                }

                if (guess === secretNumber) {
                    gameHint.textContent = '🎉 Угадал! Число было ' + secretNumber + '. Сыграем ещё?';
                    gameActive = false;
                    gameBtn.textContent = 'новая игра';
                    score += 10;
                    updateScoreDisplay();
                    playWinSound();
                } else if (guess < secretNumber) {
                    gameHint.textContent = '⬆️ больше';
                    score -= 1;
                    updateScoreDisplay();
                    playClickSound();
                } else {
                    gameHint.textContent = '⬇️ меньше';
                    score -= 1;
                    updateScoreDisplay();
                    playClickSound();
                }
                gameInput.value = '';
            });

            gameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    gameBtn.click();
                }
            });
        })();
    </script>
</body>
</html>
